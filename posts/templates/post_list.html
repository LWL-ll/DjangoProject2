{% load static %}
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子列表 - 校园美食</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap");

      :root {
        --page-bg: #f0f8ff;
        --card-bg: #ffffff;
        --ink: #ffffff;
        --muted: #5e6d7f;
        --shadow: rgba(52, 152, 219, 0.12);
        --border: rgba(52, 152, 219, 0.08);
        --primary: #3498db;
        --primary-dark: #2980b9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: linear-gradient(180deg, #f0f8ff 0%, #e8f4fd 100%);
        color: var(--ink);
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
      }

      .navbar {
        background: var(--nav-bg);
        padding: 12px 20px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 12px rgba(52, 152, 219, 0.25);
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 26px;
        font-weight: bold;
        color: #fff;
        text-decoration: none;
        letter-spacing: 1px;
      }

      .nav-links {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .nav-link {
        color: #fff;
        text-decoration: none;
        padding: 8px 18px;
        border-radius: 20px;
        font-weight: 600;
        transition: all 0.2s;
        background: rgba(255, 255, 255, 0.1);
      }

      .nav-link:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-2px);
      }

      .page {
        min-height: 100vh;
        padding: clamp(32px, 6vw, 84px) clamp(18px, 4vw, 56px);
        padding-top: 100px;
      }

      .page-title {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 700;
        margin-bottom: clamp(24px, 4vw, 48px);
        letter-spacing: 0.05em;
        color: var(--primary-dark);
      }

      .card-grid {
        width: min(1200px, 92vw);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(20px, 3vw, 34px);
      }

      .menu-card {
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 8px 24px var(--shadow), 0 2px 8px rgba(52, 152, 219, 0.06);
        border: 2px solid rgba(52, 152, 219, 0.1);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        animation: float-in 0.9s ease both;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .menu-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 32px var(--shadow), 0 4px 12px rgba(52, 152, 219, 0.12);
        border-color: var(--primary);
      }

      .menu-card:nth-child(1) { animation-delay: 0s; }
      .menu-card:nth-child(2) { animation-delay: 0.1s; }
      .menu-card:nth-child(3) { animation-delay: 0.2s; }
      .menu-card:nth-child(4) { animation-delay: 0.3s; }
      .menu-card:nth-child(5) { animation-delay: 0.4s; }
      .menu-card:nth-child(6) { animation-delay: 0.5s; }

      .media {
        position: relative;
        background: linear-gradient(135deg, #e8f4f8 0%, #d4e8f0 100%);
        aspect-ratio: 4 / 3;
        overflow: hidden;
      }

      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(0.95) contrast(1.02);
      }

      .content {
        padding: 20px 22px 24px;
      }

      .content h3 {
        margin: 0 0 8px;
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #ffffff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .content p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1024px) {
        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .card-grid {
          grid-template-columns: 1fr;
        }

        .nav-links {
          gap: 8px;
        }

        .nav-link {
          padding: 6px 12px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .menu-card {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="logo">🍜 CNU美食</a>
        <div class="nav-links">
          <a href="/" class="nav-link">首页</a>
          <a href="/posts/" class="nav-link">帖子</a>
          <a href="/community/tuijian/" class="nav-link">推荐</a>
          {% if user.is_authenticated %}
          <a href="/posts/create/" class="nav-link">发布</a>
          <a href="/posts/my-posts/" class="nav-link">我的</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="page">
      <h1 class="page-title">帖子列表</h1>
      <section class="card-grid" aria-label="帖子卡片">
        {% for post in page_obj %}
        <article class="menu-card" onclick="window.location.href='/posts/{{ post.id }}/'">
          <div class="media">
            {% if post.cover_image %}
            <img src="{{ post.cover_image.url }}" alt="{{ post.title }}" />
            {% elif post.image_count > 0 %}
            <img src="{{ post.images.first.image.url }}" alt="{{ post.title }}" />
            {% else %}
            <img src="{% static 'img/backgrounds/fast_food_1.jpg' %}" alt="默认图片" />
            {% endif %}
          </div>
          <div class="content">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content|truncatewords:40 }}</p>
          </div>
        </article>
        {% empty %}
        <p style="grid-column: 1 / -1; text-align: center; color: var(--muted); font-size: 18px; padding: 60px 0;">
          暂无帖子
        </p>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
