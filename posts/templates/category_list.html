{% load static %}
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ category_name }} - 校园美食</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap");

      :root {
        --page-bg: #E6F0FA;
        --card-bg: #ffffff;
        --ink: #003366;
        --muted: #6C757D;
        --shadow: rgba(0, 51, 102, 0.1);
        --border: rgba(0, 51, 102, 0.08);
        --primary: #004080;
        --primary-dark: #003366;
        --nav-bg: rgba(255, 255, 255, 0.85);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #E6F0FA;
        color: var(--ink);
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
      }

      .page {
        min-height: 100vh;
        padding: clamp(32px, 6vw, 84px) clamp(18px, 4vw, 56px);
        padding-top: 100px;
        background: #E6F0FA;
      }

      .page-title {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 700;
        margin-bottom: clamp(24px, 4vw, 48px);
        letter-spacing: 0.05em;
        color: var(--primary-dark);
        position: relative;
        padding-bottom: 15px;
      }

      .page-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--primary), transparent);
        border-radius: 2px;
      }

      .card-grid {
        width: min(1200px, 92vw);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(20px, 3vw, 34px);
      }

      .menu-card {
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 51, 102, 0.08), 0 2px 8px rgba(0, 51, 102, 0.04);
        border: 1px solid rgba(0, 51, 102, 0.06);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        animation: float-in 0.9s ease both;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .menu-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 36px rgba(0, 51, 102, 0.15), 0 4px 12px rgba(0, 51, 102, 0.08);
        border-color: var(--primary);
      }

      .menu-card:nth-child(1) { animation-delay: 0s; }
      .menu-card:nth-child(2) { animation-delay: 0.1s; }
      .menu-card:nth-child(3) { animation-delay: 0.2s; }
      .menu-card:nth-child(4) { animation-delay: 0.3s; }
      .menu-card:nth-child(5) { animation-delay: 0.4s; }
      .menu-card:nth-child(6) { animation-delay: 0.5s; }

      .media {
        position: relative;
        background: linear-gradient(135deg, #e8f4f8 0%, #d4e8f0 100%);
        aspect-ratio: 4 / 3;
        overflow: hidden;
      }

      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(0.95) contrast(1.02);
      }

      .content {
        padding: 20px 22px 24px;
      }

      .content h3 {
        margin: 0 0 8px;
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--primary-dark);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .content p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1024px) {
        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .card-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .menu-card {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    {% include 'common/navbar.html' %}

    <main class="page">
      <h1 class="page-title">{{ category_name }}</h1>
      <section class="card-grid" aria-label="帖子卡片">
        {% for post in page_obj %}
        <article class="menu-card" onclick="window.location.href='/posts/{{ post.id }}/'">
          <div class="media">
            {% if post.cover_image %}
            <img src="{{ post.cover_image.url }}" alt="{{ post.title }}" />
            {% elif post.images.exists %}
            <img src="{{ post.images.first.image.url }}" alt="{{ post.title }}" />
            {% else %}
            <img src="{% static 'img/backgrounds/tower_bg.jpg' %}" alt="默认图片" />
            {% endif %}
          </div>
          <div class="content">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content|truncatewords:40 }}</p>
          </div>
        </article>
        {% empty %}
        <p style="grid-column: 1 / -1; text-align: center; color: #555555; font-size: 18px; background: #FFFFFF; border-radius: 12px; padding: 60px 20px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 20px rgba(0, 51, 102, 0.08);">
          暂无帖子
        </p>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
