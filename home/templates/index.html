<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园美食</title>
    {% load static %}
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'js/bootstrap5/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/zhuyao.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden;
            height: 100%;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #ffffff !important;
            transition: background-color 0.1s ease;
        }

        .parallax-section {
            position: relative;
            width: 100%;
            height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: transparent;
            margin: 0;
        }

        .parallax-section img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .parallax-section img#mountains_front {
            z-index: 10;
        }

        #explore-btn {
            text-decoration: none;
            display: inline-block;
            padding: 15px 50px;
            border-radius: 50px;
            background: #fff;
            color: #1976d2;
            font-size: 2em;
            font-weight: 600;
            z-index: 9;
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 8px 25px rgba(25, 118, 210, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            border: 3px solid #1976d2;
        }

        #explore-btn:hover {
            background: #1976d2;
            color: #fff;
            box-shadow: 0 12px 35px rgba(25, 118, 210, 0.5);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .content-section {
            position: relative;
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1976d2;
            z-index: 100;
        }
    </style>
</head>
<body>
    <!-- 固定顶部导航栏 -->
    {% include 'common/navbar.html' %}

    <!-- 视差滚动区域 -->
    <section class="parallax-section" style="margin-top: 10px;">
        <img src="{% static 'parallax-images/stars.png' %}" id="stars" alt="星空">
        <img src="{% static 'parallax-images/mountains_behind.png' %}" id="mountains_behind" alt="远山">
        <a href="#main-content" id="explore-btn">探索美食</a>
        <img src="{% static 'parallax-images/mountains_front.png' %}" id="mountains_front" alt="近山">
    </section>

    <!-- 主要内容区域（原主页内容） -->
    <div id="main-content" class="content-section">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&display=swap"
          rel="stylesheet"
        />
        <style>
          :root {
            --primary-blue: #1976d2;
            --light-blue: #e3f2fd;
            --medium-blue: #bbdefb;
            --dark-blue: #0d47a1;
            --white: #ffffff;
          }

          .new-content * {
            box-sizing: border-box;
          }

          .new-content {
            font-family: "Ma Shan Zheng", cursive, sans-serif;
            background: var(--white);
            color: var(--primary-blue);
          }

          .hero {
            min-height: 66vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 80px 16px 60px;
            background: linear-gradient(180deg, var(--white) 0%, var(--light-blue) 100%);
          }

          .hero-inner {
            max-width: 820px;
          }

          .hero-kicker {
            color: var(--primary-blue);
            font-size: clamp(42px, 5vw, 72px);
            margin: 0 0 10px;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 rgba(25, 118, 210, 0.1);
          }

          .hero-title {
            font-size: clamp(36px, 6vw, 80px);
            letter-spacing: 3px;
            margin: 20px 0 30px;
            color: var(--dark-blue);
            line-height: 1.3;
            text-shadow: 3px 3px 0 rgba(25, 118, 210, 0.15);
          }

          .hero-copy {
            font-size: clamp(18px, 2vw, 22px);
            line-height: 2;
            margin: 40px auto 45px;
            max-width: 700px;
            color: var(--primary-blue);
            padding: 25px 35px;
            background: var(--white);
            border: 3px solid var(--primary-blue);
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            box-shadow: 4px 4px 0 rgba(25, 118, 210, 0.2);
          }

          .hero-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            color: var(--primary-blue);
            padding: 20px 55px;
            border: 3px solid var(--primary-blue);
            font-size: clamp(18px, 2vw, 22px);
            letter-spacing: 2px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--primary-blue);
            transition: all 0.3s ease;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
          }

          .hero-button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--dark-blue);
            background: var(--primary-blue);
            color: var(--white);
          }

          .gallery {
            position: relative;
            background: var(--light-blue);
            padding: 74px 0 120px;
          }

          .gallery::before {
            content: "";
            position: absolute;
            left: -4vw;
            right: -4vw;
            top: -25px;
            height: 40px;
            background: var(--white);
            transform: rotate(-4deg);
            box-shadow: 0 5px 0 var(--white);
            z-index: 0;
          }

          .gallery-band {
            display: flex;
            gap: 0;
            justify-content: center;
            align-items: flex-end;
            padding: 0 28px;
            transform: translateY(44px);
            position: relative;
            z-index: 1;
          }

          .card {
            position: relative;
            background: var(--white);
            padding: 10px 10px 15px;
            border: 3px solid var(--primary-blue);
            box-shadow: 5px 5px 0 rgba(25, 118, 210, 0.2);
            transform: rotate(var(--tilt, -4deg));
            transition: all 0.4s ease;
            opacity: 0;
            margin-left: -58px;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
          }

          .card:hover {
            transform: rotate(var(--tilt, -4deg)) translateY(-8px) scale(1.05);
            box-shadow: 8px 8px 0 rgba(25, 118, 210, 0.3);
          }

          .card:first-child {
            margin-left: 0;
          }

          .card img {
            display: block;
            width: clamp(170px, 15vw, 230px);
            height: clamp(170px, 15vw, 230px);
            object-fit: cover;
            background: var(--white);
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
          }

          .card:nth-child(2) {
            --tilt: 3deg;
          }

          .card:nth-child(3) {
            --tilt: -2deg;
          }

          .card:nth-child(4) {
            --tilt: 2deg;
          }

          .card:nth-child(5) {
            --tilt: -6deg;
          }

          .card:nth-child(6) {
            --tilt: 4deg;
          }

          .gallery.in-view .card {
            animation: popIn 0.7s ease forwards;
          }

          .gallery.in-view .card:nth-child(2) {
            animation-delay: 0.08s;
          }

          .gallery.in-view .card:nth-child(3) {
            animation-delay: 0.16s;
          }

          .gallery.in-view .card:nth-child(4) {
            animation-delay: 0.24s;
          }

          .gallery.in-view .card:nth-child(5) {
            animation-delay: 0.32s;
          }

          .gallery.in-view .card:nth-child(6) {
            animation-delay: 0.4s;
          }

          @keyframes popIn {
            0% {
              transform: translateY(40px) rotate(var(--tilt, -4deg)) scale(0.95);
              opacity: 0;
            }
            60% {
              transform: translateY(-8px) rotate(var(--tilt, -4deg)) scale(1.02);
              opacity: 1;
            }
            100% {
              transform: translateY(0) rotate(var(--tilt, -4deg)) scale(1);
              opacity: 1;
            }
          }

          @media (max-width: 980px) {
            .gallery-band {
              flex-wrap: wrap;
            }

            .card {
              margin-bottom: 20px;
            }
          }

          @media (max-width: 620px) {
            .hero {
              padding: 72px 16px 64px;
            }

            .hero-copy {
              font-size: 16px;
            }

            .hero-button {
              width: 100%;
            }
          }
        </style>

        <div class="new-content">
          <section class="hero">
            <div class="hero-inner">
              <p class="hero-kicker">干饭人情报站</p>
              <h1 class="hero-title">无广亲测不踩雷・校园限定</h1>
              <p class="hero-copy">
                别再对着食堂窗口犯选择困难！<br/>
                这里是本校干饭人真实测评基地，<br/>
                帮你筛掉黑暗料理，锁定食堂 / 外卖宝藏，<br/>
                把干饭时间从 10 分钟决策直接缩短到 3 秒！
              </p>
              <button class="hero-button">速取干饭清单</button>
            </div>
          </section>
          <section class="gallery" id="gallery">
            <div class="gallery-band">
              <figure class="card" style="--tilt: -6deg">
                <img
                  src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=900&q=80"
                  alt="Fresh salad bowl"
                />
              </figure>
              <figure class="card" style="--tilt: 4deg">
                <img
                  src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80"
                  alt="Salmon bowl"
                />
              </figure>
              <figure class="card" style="--tilt: -2deg">
                <img
                  src="https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=900&q=80"
                  alt="Grilled sandwich"
                />
              </figure>
              <figure class="card" style="--tilt: 3deg">
                <img
                  src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?auto=format&fit=crop&w=900&q=80"
                  alt="Breakfast plate"
                />
              </figure>
              <figure class="card" style="--tilt: -4deg">
                <img
                  src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=900&q=80"
                  alt="Avocado toast"
                />
              </figure>
              <figure class="card" style="--tilt: 5deg">
                <img
                  src="https://images.unsplash.com/photo-1525351484163-7529414344d8?auto=format&fit=crop&w=900&q=80"
                  alt="Pastry plate"
                />
              </figure>
            </div>
          </section>
        </div>
    </div>

    <!-- ========== 脚本 ========== -->
    <script src="{% static 'js/bootstrap5/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap5/bootstrap.min.js' %}"></script>
    <script>
        // 视差滚动效果
        let stars = document.getElementById('stars');
        let mountains_behind = document.getElementById('mountains_behind');
        let explore_btn = document.getElementById('explore-btn');
        let mountains_front = document.getElementById('mountains_front');

        window.addEventListener('scroll', function(){
            let value = window.scrollY;

            mountains_behind.style.top = value * 0.5 + 'px';
            mountains_front.style.top = value * 0 + 'px';

            explore_btn.style.marginTop = value * 1.5 + 'px';
        });

        // 画廊动画
        const gallery = document.querySelector(".gallery");
        if (gallery) {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  gallery.classList.add("in-view");
                }
              });
            },
            { threshold: 0.35 }
          );
          observer.observe(gallery);
        }
    </script>
</body>
</html>
