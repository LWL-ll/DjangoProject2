{% load static %}
<header class="p-3 text-bg-light border-bottom" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 10000; margin-bottom: 0;">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                <img src="{% static 'parallax-images/CNU.png' %}" alt="Logo" height="40">
            </a>
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 text-secondary">首页</a></li>
                <li><a href="/community/bilei/" class="nav-link px-2 text-secondary">避雷墙</a></li>
                <li><a href="/community/recommend/" class="nav-link px-2 text-secondary">推荐</a></li>
                <li><a href="/personalize/" class="nav-link px-2 text-secondary">个性化推荐</a></li>
            </ul>

            <div class="dropdown text-end">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle"
                   data-bs-toggle="dropdown" aria-expanded="false">
                    {% if user.is_authenticated %}
                        {{ user.username }}
                    {% else %}
                        未登录
                    {% endif %}
                </a>
                <ul class="dropdown-menu text-small">
                    {% if user.is_authenticated %}
                        <li><a class="dropdown-item logout-link" href="#">退出登录</a></li>
                    {% else %}
                        <li><a class="dropdown-item" href="/auth/login/">登录</a></li>
                        <li><a class="dropdown-item" href="/auth/register/">注册</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </div>
</header>

<script>
    // 退出登录功能
    document.querySelectorAll('.logout-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            fetch('/auth/user-logout/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert('退出登录失败，请重试');
                }
            })
            .catch(error => {
                console.error('退出登录错误:', error);
                alert('网络错误，请检查网络连接后重试');
            });
        });
    });

    // 获取 CSRF Token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
