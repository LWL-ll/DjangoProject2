<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园美食点餐系统</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/zhuyao.css' %}">
</head>
<body>
    <!--头部区域-->
    <div class="header">
        <div class="wrapper">
            <!--logo-->
            <div class="logo">
                <h1><a href="#">校园美食</a></h1>
            </div>
            <!-- 导航栏（类名daohang，和CSS对应） -->
            <div class="daohang">
                <ul>
                    <li><a href="/auth/login/" id="loginLink">登录</a></li>
                    <li><a href="#" class="active">首页</a></li>
                    <li><a href="#">个性化</a></li>
                    <li><a href="#">推荐</a></li>
                    <li><a href="javascript:void(0)" id="bileiLink">避雷</a></li>
                </ul>
            </div>
            <!-- 搜索框 -->
            <div class="search">
                <input type="text" placeholder="请输入关键字">
                <a href="#">1</a>
            </div>
            <!-- 用户 -->
            <div class="yonghu" id="userDisplay">
                <span id="loginText">用户</span>
                <a href="/auth/login/" id="loginBtn">登录</a>
                <span id="usernameText" style="display:none;"></span>
                <a href="javascript:void(0)" id="logoutBtn" style="display:none;">退出</a>
            </div>
        </div>
    </div>
    <!-- 优化后的Banner区（带轮播图，右对齐） -->
<div class="banner">

    <div class="wrapper" style="display: flex; align-items: center; justify-content: space-between;">

        <!-- 左侧文字 -->
        <div class="banner-text">
            <h2>校园美食，一键直达</h2>
            <p>足不出宿舍，吃遍校园美味</p>
            <a href="#" class="banner-btn">立即点餐</a>
        </div>

        <!-- 右侧轮播图（不需要 margin-left: auto，因为父级用了 space-between） -->
        <div class="carousel-container" style="width: 500px; flex-shrink: 0; position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <div class="carousel-wrapper" id="carouselWrapper" style="display: flex; transition: transform 0.5s ease-in-out; height: 350px;">

                <div class="carousel-slide" style="min-width: 100%; height: 100%;">
                    <img src="{% static 'tu/微信图片_20260414200616_124_2.jpg' %}" alt="美食1" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="carousel-slide" style="min-width: 100%; height: 100%;">
                    <img src="{% static 'tu/微信图片_20260414200815_126_2.jpg' %}" alt="美食2" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="carousel-slide" style="min-width: 100%; height: 100%;">
                    <img src="{% static 'tu/微信图片_20260414200816_127_2.jpg' %}" alt="美食3" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="carousel-slide" style="min-width: 100%; height: 100%;">
                    <img src="{% static 'tu/微信图片_20260414200806_125_2.jpg' %}" alt="美食4" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

            </div>

            <button onclick="prevSlide()" style="position: absolute; top: 50%; left: 15px; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; color: #4a148c; z-index: 10;">❮</button>
            <button onclick="nextSlide()" style="position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; color: #4a148c; z-index: 10;">❯</button>

            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10;">
                <span class="carousel-dot active" onclick="goToSlide(0)" style="width: 12px; height: 12px; border-radius: 50%; background: white; cursor: pointer; border: 2px solid #4a148c;"></span>
                <span class="carousel-dot" onclick="goToSlide(1)" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: 2px solid transparent;"></span>
                <span class="carousel-dot" onclick="goToSlide(2)" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: 2px solid transparent;"></span>
                <span class="carousel-dot" onclick="goToSlide(3)" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: 2px solid transparent;"></span>
            </div>
        </div>

    </div>
</div>

    <!-- 美食分类区 -->
    <div class="category">
        <div class="wrapper">
            <h3 class="section-title">美食分类</h3>
            <div class="category-list">
                <div class="category-item">
                    <div class="category-icon">🍔</div>
                    <p>快餐汉堡</p>
                </div>
                <div class="category-item">
                    <div class="category-icon">🥤</div>
                    <p>奶茶饮品</p>
                </div>
                <div class="category-item">
                    <div class="category-icon">🍜</div>
                    <p>中式正餐</p>
                </div>
                <div class="category-item">
                    <div class="category-icon">🍰</div>
                    <p>甜品糕点</p>
                </div>
                <div class="category-item">
                    <div class="category-icon">🌮</div>
                    <p>特色小吃</p>
                </div>
                <div class="category-item">
                    <div class="category-icon">🥗</div>
                    <p>轻食减脂</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 轮播图脚本（放在 </body> 前面）========== -->
    <script>
        let currentSlide = 0;
        const wrapper = document.getElementById('carouselWrapper');
        const dots = document.querySelectorAll('.carousel-dot');
        const totalSlides = 4;

        function updateCarousel() {
            wrapper.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
            dots.forEach((dot, index) => {
                if (index === currentSlide) {
                    dot.style.background = 'white';
                    dot.style.borderColor = '#4a148c';
                } else {
                    dot.style.background = 'rgba(255,255,255,0.5)';
                    dot.style.borderColor = 'transparent';
                }
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }

        // 自动播放
        let autoPlay = setInterval(nextSlide, 4000);

        // 鼠标悬停暂停
        const container = document.querySelector('.carousel-container');
        container.addEventListener('mouseenter', function() {
            clearInterval(autoPlay);
        });
        container.addEventListener('mouseleave', function() {
            autoPlay = setInterval(nextSlide, 4000);
        });

        // ===== 登录状态管理 =====
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginText = document.getElementById('loginText');
        const usernameText = document.getElementById('usernameText');
        const bileiLink = document.getElementById('bileiLink');

        let isLoggedIn = false;

        // 页面加载时检查登录状态
        window.addEventListener('load', function() {
            checkLoginStatus();
        });

        // 检查登录状态
        function checkLoginStatus() {
            fetch('/auth/check-login/')
                .then(response => response.json())
                .then(data => {
                    if (data.is_authenticated) {
                        // 已登录，显示用户名和退出按钮
                        loginText.style.display = 'none';
                        loginBtn.style.display = 'none';
                        usernameText.style.display = 'inline';
                        usernameText.textContent = data.username;
                        logoutBtn.style.display = 'inline';
                        isLoggedIn = true;
                    } else {
                        // 未登录，显示登录按钮
                        loginText.style.display = 'inline';
                        loginBtn.style.display = 'inline';
                        usernameText.style.display = 'none';
                        logoutBtn.style.display = 'none';
                        isLoggedIn = false;
                    }
                })
                .catch(error => {
                    console.error('检查登录状态失败:', error);
                });
        }

        // 避雷链接点击事件
        if (bileiLink) {
            bileiLink.addEventListener('click', function() {
                if (isLoggedIn) {
                    // 已登录，跳转到避雷页面
                    window.location.href = '/bilei/';
                } else {
                    // 未登录，跳转到登录页面
                    alert('请先登录后再访问避雷页面');
                    window.location.href = '/auth/login/';
                }
            });
        }

        // 退出登录
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    fetch('/auth/user-logout/', {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert('已退出登录');
                            // 刷新页面更新状态
                            location.reload();
                        }
                    })
                    .catch(error => {
                        console.error('退出登录失败:', error);
                    });
                }
            });
        }

        // 获取 CSRF Token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>

</body>
</html>
