{% load static %}
<header class="p-3 text-bg-light border-bottom" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 10000; margin-bottom: 0;">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                <img src="{% static 'parallax-images/CNU.png' %}" alt="Logo" height="40">
            </a>
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 text-secondary">首页</a></li>
                <li><a href="/blog/pub/" class="nav-link px-2 text-secondary">发布博客</a></li>
            </ul>
            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search" action="/blog/search/" method="GET">
                <input type="search" name="q" class="form-control" placeholder="搜索..." aria-label="Search">
            </form>
            <div class="dropdown text-end">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle"
                   data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="{% static 'parallax-images/CNU.png' %}" alt="用户头像" width="32" height="32" class="rounded-circle">
                </a>
                <ul class="dropdown-menu text-small">
                    <li><a class="dropdown-item" href="/auth/logout/">退出登录</a></li>
                </ul>
            </div>
        </div>
    </div>
</header>
