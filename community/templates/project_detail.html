<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食平台</title>
    {% load static %}
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'js/bootstrap5/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: url("{% static 'img/dishes/background.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            background-color: #f0f7ff;
            color: #333;
            padding-top: 100px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(240, 247, 255, 0.1);
            z-index: -1;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }

        .page.active {
            display: block;
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #3688FF;
            margin: 20px 0 40px;
        }

        .home-box {
            background: rgba(255,255,255,0.92);
            border-radius: 15px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .post-btn {
            background: #3688FF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .post-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .post-modal.show {
            display: flex;
        }

        .post-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 450px;
        }

        .post-form h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-item {
            margin-bottom: 15px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
        }

        .form-item input,
        .form-item textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-group button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-submit {
            background: #3688FF;
            color: white;
        }

        .btn-close {
            background: #eee;
        }

        .cate-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .cate-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .cate-item:hover {
            transform: translateY(-3px);
        }

        .cate-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 10px;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8f3ff;
            border-radius: 50%;
            color: #3688FF;
        }

        .cate-item p {
            font-size: 17px;
            font-weight: 500;
        }

        .list-box {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px;
            max-width: 1000px;
            margin: 40px auto 0;
        }

        .img-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .img-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .img-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

<!-- 固定顶部导航栏 -->
{% include 'common/navbar.html' %}

<!-- 首页 -->
<div id="page-home" class="page active">

    <div class="home-box">
        <button class="post-btn" onclick="window.location.href='/community/tuijian/'">+ 发布帖子</button>

        <h2 class="title">美食分类</h2>
        <div class="cate-grid">
            <div class="cate-item" onclick="window.location.href='/posts/fast-food/'" style="cursor: pointer;">
                <div class="cate-icon">🍔</div>
                <p>快餐汉堡</p>
            </div>
            <div class="cate-item" onclick="window.location.href='/posts/milk-tea/'" style="cursor: pointer;">
                <div class="cate-icon">🧋</div>
                <p>奶茶饮品</p>
            </div>
            <div class="cate-item" onclick="window.location.href='/posts/chinese-food/'" style="cursor: pointer;">
                <div class="cate-icon">🍜</div>
                <p>中式正餐</p>
            </div>
            <div class="cate-item" onclick="window.location.href='/posts/dessert/'" style="cursor: pointer;">
                <div class="cate-icon">🍰</div>
                <p>甜品糕点</p>
            </div>
            <div class="cate-item" onclick="window.location.href='/posts/snack/'" style="cursor: pointer;">
                <div class="cate-icon">🍢</div>
                <p>特色小吃</p>
            </div>
            <div class="cate-item" onclick="window.location.href='/posts/light-food/'" style="cursor: pointer;">
                <div class="cate-icon">🥗</div>
                <p>轻食减脂</p>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="{% static 'js/bootstrap5/popper.min.js' %}"></script>
<script src="{% static 'js/bootstrap5/bootstrap.min.js' %}"></script>

</body>
</html>
